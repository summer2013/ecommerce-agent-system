<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 · 电商自动化系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border: 1px solid #e0e0e0; padding: 48px 40px 40px; width: 380px; }
  .logo { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: #9e9e9e; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 32px; letter-spacing: -.3px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #616161; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; background: #f5f5f5; font-size: 14px; outline: none; }
  input:focus { border-color: #212121; background: #fff; }
  .error { color: #c62828; font-size: 12px; margin-bottom: 12px; padding: 8px 12px; background: #fce4ec; }
  .btn { width: 100%; padding: 11px; background: #212121; color: #fff; border: none; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #333; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">E-Commerce Ops System</div>
  <h1>电商自动化系统</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" placeholder="请输入用户名" autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" placeholder="请输入密码">
    </div>
    <button class="btn" type="submit">登录</button>
  </form>
</div>
</body>
</html>
