{% extends "ops/base.html" %}
{% block title %}系统设置{% endblock %}
{% block nav_settings %}active{% endblock %}

{% block content %}
<div class="topbar">
  <div class="breadcrumb"><span>系统设置</span></div>
</div>
<div class="page-body">
  <div style="max-width:640px">

    <div style="margin-bottom:28px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e0e0e0">邮件配置</div>
      <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5;font-size:13px">
        <span style="color:#9e9e9e">Gmail 账号</span>
        <span>{{ email_address }}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:12px 0;font-size:13px">
        <span style="color:#9e9e9e">轮询方式</span>
        <span>Celery Beat · 每 60 秒</span>
      </div>
    </div>

  </div>
</div>
{% endblock %}
