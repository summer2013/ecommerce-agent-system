<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}电商自动化系统{% endblock %}</title>
<style>
  :root {
    --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
    --muted: #9e9e9e; --secondary: #616161; --primary: #212121;
    --sidebar-w: 220px; --nav-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--primary); font-size: 14px; line-height: 1.5; display: flex; min-height: 100vh; }

  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-brand-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .sidebar-brand-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .sidebar-nav { padding: 12px 0; flex: 1; }
  .nav-section-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 8px 20px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 13px; color: var(--secondary); cursor: pointer; border-left: 2px solid transparent; text-decoration: none; }
  .nav-item:hover { background: var(--bg); color: var(--primary); }
  .nav-item.active { background: var(--bg); color: var(--primary); font-weight: 500; border-left-color: var(--primary); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .sidebar-footer strong { display: block; color: var(--secondary); margin-bottom: 2px; }

  .main-content { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { height: var(--nav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
  .breadcrumb { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .breadcrumb span { color: var(--primary); font-weight: 500; }
  .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .page-body { padding: 24px; flex: 1; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-decoration: none; white-space: nowrap; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: #333; }
  .btn-default { background: var(--surface); color: var(--primary); border-color: var(--border); }
  .btn-default:hover { background: var(--bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; border-radius: 2px; white-space: nowrap; }
  .badge-pending  { background: #f5f5f5; color: #616161; border: 1px solid #e0e0e0; }
  .badge-confirmed{ background: #e3f2fd; color: #0d47a1; }
  .badge-running  { background: #fff3e0; color: #e65100; }
  .badge-done     { background: #e8f5e9; color: #1b5e20; }
  .badge-failed   { background: #fce4ec; color: #880e4f; }
  .badge-draft    { background: #f5f5f5; color: #616161; border: 1px solid #e0e0e0; }
  .badge-reviewing{ background: #fff3e0; color: #e65100; }
  .badge-published{ background: #e8f5e9; color: #1b5e20; }
  .badge-active   { background: #e8f5e9; color: #1b5e20; }
  .badge-deactivating { background: #fff3e0; color: #e65100; }
  .badge-inactive { background: #f5f5f5; color: #616161; border: 1px solid #e0e0e0; }
  .badge-skipped  { background: #f5f5f5; color: #616161; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); }
  .table-toolbar { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .table-title { font-weight: 600; font-size: 14px; }
  .table-toolbar-right { margin-left: auto; display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: #fafafa; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .stat-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 16px; cursor: pointer; }
  .stat-card:hover { border-color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 600; letter-spacing: -.5px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-btn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--secondary); text-decoration: none; }
  .filter-btn:hover,.filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); padding: 28px; width: 400px; max-width: 90vw; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: var(--secondary); margin-bottom: 24px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .toast { display: none; position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--primary); color: #fff; font-size: 13px; z-index: 2000; }
  .toast.show { display: flex; align-items: center; gap: 8px; }
  .toast.error { background: #c62828; }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-label">E-Commerce Ops</div>
    <div class="sidebar-brand-name">自动化系统</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">主功能</div>
    <a class="nav-item {% block nav_tasks %}{% endblock %}" href="{% url 'ops_tasklist' %}">
      <span>📋</span> 任务列表
    </a>
    <a class="nav-item {% block nav_log %}{% endblock %}" href="{% url 'ops_log' %}">
      <span>🗂</span> 审计日志
    </a>
    <div class="nav-section-label">系统</div>
    <a class="nav-item {% block nav_settings %}{% endblock %}" href="{% url 'ops_settings' %}">
      <span>⚙️</span> 系统设置
    </a>
  </nav>
  <div class="sidebar-footer">
    <strong>{{ request.user.username }}</strong>
    运营专员
    <a href="{% url 'ops_logout' %}" style="display:block;margin-top:8px;font-size:12px;color:var(--muted);text-decoration:none">退出登录</a>
  </div>
</aside>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<div class="toast" id="toast"></div>

<script>
let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
