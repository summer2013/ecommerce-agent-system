version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: agent_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agent_db
      MYSQL_USER: agent_user
      MYSQL_PASSWORD: agent_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: